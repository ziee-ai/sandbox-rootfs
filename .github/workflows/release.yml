name: release sandbox-rootfs

# Build + sign + publish the sandbox rootfs on tag push.
#
# Triggered by semver tags (`v0.1.0`, etc.) matched against the regex
# below — same convention as `ziee-ai/llama.cpp` and
# `ziee-ai/mistral.rs`. The release tag IS the version; artifacts are
# named with arch + flavor only.
#
# The build is Linux-only because `mmdebstrap` requires a Linux host
# (it bootstraps a Debian/Ubuntu rootfs). The OUTPUT, however, is
# consumed on all three host OSes:
#   - Linux:   `.squashfs`, mounted via `squashfuse` inside `bwrap`
#   - macOS:   `.squashfs`, mounted via `libkrun` inside the microVM
#   - Windows: `.tar.zst`,  imported into WSL2 (`wsl --import`)
#
# We produce both packagings per (flavor × arch) tag so every host
# downloads the right artifact for its sandbox backend.
#
# Tests are NOT run in CI — run them locally before tagging.
# The only thing this workflow does that you can't do locally is
# cosign keyless signing, which requires the real GitHub Actions
# OIDC issuer.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). MUST already exist as a git tag.'
        required: true

# Do NOT cancel in-flight publishes — they upload artifacts and a
# half-completed cancellation leaves a partial release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: build (${{ matrix.arch }}, ${{ matrix.flavor }}, ${{ matrix.package }})
    # x86_64 builds on the standard x64 runner; aarch64 builds NATIVELY
    # on GitHub's free arm64 Linux runner (no qemu emulation — apt +
    # systemd-nspawn run on real arm64, which keeps the build
    # deterministic and fast).
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 90
    permissions:
      contents: write   # gh release upload
      id-token: write   # cosign keyless OIDC
    strategy:
      # Build flavors + packages in parallel; one failing doesn't block
      # the others. Matrix expansion: 2 arches × 2 flavors × 2 packages
      # = 8 jobs.
      fail-fast: false
      matrix:
        arch:    [x86_64, aarch64]
        flavor:  [minimal, full]
        package: [squashfs, tar]
    steps:
      - uses: actions/checkout@v4

      - name: validate tag shape
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if [ -z "$tag" ] || [ "$tag" = "main" ] || [ "$tag" = "master" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          # Accept plain semver (`v0.1.0`) AND pre-release variants
          # (`v0.0.1-alpha`, `v1.0.0-rc.1`, `v0.1.0-beta.2`) — the
          # server's GitHub-releases discovery filters drafts /
          # prereleases when picking the boot-time pin so a
          # `-alpha`-tagged release is opt-in for admins via the UI.
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$'; then
            echo "ERROR: tag '$tag' must match semver (v0.1.0 or v0.1.0-alpha)" >&2
            exit 1
          fi
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: install host deps
        # New build path uses ubuntu-base + a single apt-install layer
        # instead of mmdebstrap. We still need squashfs-tools, zstd,
        # zsync (for sidecars), and systemd-container (for nspawn);
        # mmdebstrap + bubblewrap + squashfuse are no longer build-time
        # requirements.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            squashfs-tools zsync zstd systemd-container

      - name: cache ubuntu-base tarball
        # ubuntu-base-24.04.x is sha-pinned in flavors/*/flavor.sh, so
        # a cache hit is byte-identical to a fresh download. ~30 MB
        # saved per CI run vs going to cdimage.ubuntu.com every time.
        uses: actions/cache@v4
        with:
          path: .cache/ubuntu-base-*.tar.gz
          key: ubuntu-base-${{ matrix.arch }}-v2

      - name: install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'

      - name: build rootfs
        # Single pass. Deterministic by construction (sha-pinned base
        # tarball, single apt layer against a pinned snapshot,
        # normalised mtimes/logs/caches, reproducible mksquashfs /
        # tar flags). No two-pass reproducibility check — see build.sh
        # header for the rationale.
        run: ./build.sh --flavor ${{ matrix.flavor }} --package ${{ matrix.package }} --arch ${{ matrix.arch }} --version "$VERSION"

      - name: size sanity check
        run: |
          set -euo pipefail
          if [ "${{ matrix.package }}" = "tar" ]; then ext="tar.zst"; else ext="squashfs"; fi
          art=".cache/ziee-sandbox-rootfs-${{ matrix.arch }}-${{ matrix.flavor }}.${ext}"
          size=$(stat -c%s "$art")
          # GitHub Releases per-asset cap = 2 GiB.
          if [ "$size" -gt $((2 * 1024 * 1024 * 1024)) ]; then
            echo "FAIL: $art is $size bytes; exceeds GitHub Releases 2 GiB cap" >&2
            exit 1
          fi
          # Per-flavor floors so a missing-package regression trips the
          # build. Numbers are sized for squashfs (zstd-19); tar.zst
          # comes out larger because it doesn't get the cross-file
          # dedup that squashfs does, so we relax the floor for tar.
          if [ "${{ matrix.flavor }}" = "minimal" ] && [ "$size" -lt $((50 * 1024 * 1024)) ]; then
            echo "FAIL: minimal flavor suspiciously small ($size)" >&2; exit 1
          fi
          if [ "${{ matrix.flavor }}" = "full" ] && [ "$size" -lt $((500 * 1024 * 1024)) ]; then
            echo "FAIL: full flavor suspiciously small ($size); likely missing packages" >&2; exit 1
          fi

      - name: generate sha256 + zsync sidecars
        run: |
          set -euo pipefail
          if [ "${{ matrix.package }}" = "tar" ]; then ext="tar.zst"; else ext="squashfs"; fi
          art=".cache/ziee-sandbox-rootfs-${{ matrix.arch }}-${{ matrix.flavor }}.${ext}"
          sha256sum "$art" > "${art}.sha256"
          # zsync gives incremental downloads — produce a sidecar for
          # both packagings so an in-place update on either Linux/macOS
          # (squashfs) or Windows (tar.zst) can skip unchanged blocks.
          zsyncmake -o "${art}.zsync" "$art"

      - name: cosign sign (keyless GitHub OIDC)
        # Keyless cosign binds the signature to THIS workflow file's
        # OIDC identity. Operators verify via:
        #   --certificate-identity-regexp \
        #     '^https://github\.com/ziee-ai/sandbox-rootfs/\.github/workflows/release\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'
        #   --certificate-oidc-issuer \
        #     https://token.actions.githubusercontent.com
        run: |
          set -euo pipefail
          if [ "${{ matrix.package }}" = "tar" ]; then ext="tar.zst"; else ext="squashfs"; fi
          art=".cache/ziee-sandbox-rootfs-${{ matrix.arch }}-${{ matrix.flavor }}.${ext}"
          # `--new-bundle-format` emits the Sigstore protobuf bundle
          # (mediaType + verificationMaterial + messageSignature) that the
          # server's `sigstore` Rust crate parses. WITHOUT it, cosign
          # writes the legacy `{base64Signature,cert,rekorBundle}` shape,
          # which the verifier rejects with
          # "unrecognized field name 'base64Signature'".
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${art}.cosign.bundle" "$art"

      - name: publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.package }}" = "tar" ]; then ext="tar.zst"; else ext="squashfs"; fi
          art=".cache/ziee-sandbox-rootfs-${{ matrix.arch }}-${{ matrix.flavor }}.${ext}"
          gh release create "$TAG" \
            --title "sandbox-rootfs $TAG" \
            --notes "Reproducible Ubuntu-based rootfs for the ziee code sandbox. See the README for the per-host artifact picker." \
            2>/dev/null || true
          gh release upload "$TAG" \
            "$art" \
            "${art}.sha256" \
            "${art}.zsync" \
            "${art}.cosign.bundle" \
            --clobber
